# PaperCamera 配置文件
# 通过 /camera reload 热重载
# 更新插件时新增的配置项会自动合并，无需手动删除再生成

# 配置文件版本（自动管理，请勿手动修改）
config-version: 5

# 摄像机玩家名称（需要提前登录到服务器）
camera-player-name: "camera"

# 摄像机玩家登录后是否自动启动
auto-start: true

# 启动后等待时间（秒），用于等待地图加载完毕后再自动发现出生点
spawn-discovery-delay: 5

# 环绕设置
orbit:
  radius: 8.0       # 环绕半径（格）
  height: 2.5       # 摄像机高于目标的高度（格）
  speed: 0.005      # 每 tick 旋转弧度（越大转得越快）

# 跟随设置
follow:
  min-duration: 15     # 每个目标最少停留秒数
  max-duration: 30     # 每个目标最多停留秒数
  lerp-factor: 0.03    # 摄像机中心跟随目标的速度（0.0-1.0，越小越平滑）
  max-move-per-tick: 0.15  # 每 tick 摄像机中心最大移动格数（速度上限）
  teleport-threshold: 60.0  # 摄像机距离目标超过此值（格）时直接传送，避免跑步追赶导致大量区块加载
  active-player-duration-bonus: 0.5  # 目标玩家处于活跃状态（移动中）时，跟随时长乘以 (1 + 此值)

# 遮挡检测设置
occlusion:
  min-distance: 3.5  # 摄像机到目标的最近距离（格）
  max-distance: 24.0 # 摄像机到目标的最远距离（格），超过时加速靠近
  timeout-ticks: 40  # 短暂遮挡容忍时间（tick），超过后启动恢复（40=2秒）
  transition-lerp: 0.15  # 遮挡恢复时摄像机移动的 lerp 速度（越大越快）

# 摄像机平滑设置（让客户端看起来更流畅）
camera-smoothing:
  enabled: true
  lerp-factor: 0.22  # 摄像机实际位置跟随理想位置的速度（0.0-1.0，越小越平滑）
  direction-lerp-factor: 0.10  # 视角（yaw/pitch）平滑速度，越小越平滑（0.0-1.0），用于过滤跳跃等快速移动

# 出生点世界列表（只在这些世界生成出生点/主城用于无人时环绕）
# 配置后，spawn-points 中非此列表的世界会被自动跳过
# 摄像机可以跟随玩家进入任何世界（包括下界/末地），不受此列表限制
# /camera discoverspawn 会从此列表读取世界名来执行 spawn-command
idle-worlds:
  - "world"

# 主世界名（用于无人时优先展示，默认使用 idle-worlds 第一个）
# 有玩家在线时，主世界出生点的出现频率 = primary-spawn-weight（0.0-1.0）
# 设为 0.0 在有玩家时完全不展示主世界出生点，设为 1.0 则始终展示
primary-world: ""

# 出生点展示权重（有玩家在线时生效）
spawn-weight: 0.3          # 非主世界出生点的出现概率（0.0-1.0）
primary-spawn-weight: 0.5  # 主世界出生点的出现概率（0.0-1.0），设为 1.0 则始终展示

# 出生点发现命令（可选）
# 如果设置了此命令，插件会执行 "{命令前缀} {世界名}" 来传送到各世界的出生点
# 例如 mv tp 配合 MultiVerse 使用：执行 "mv tp world" 传送到 world 出生点
# 留空则使用下方手动配置的 spawn-points
spawn-command: ""

# 手动配置的出生点（当 spawn-command 为空时使用）
# 摄像机在无人时会环绕这些坐标
# 注意：世界名必须和服务器实际世界名一致，且必须在 idle-worlds 列表中
spawn-points:
  world:
    world: "world"
    x: 0.0
    y: 64.0
    z: 0.0